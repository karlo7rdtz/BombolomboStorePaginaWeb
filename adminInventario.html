<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="ImgWeb/LogoBombolomboStorePng.png">
</head>

<body class="catalogo-fondo"> <nav class="navbar navbar-expand-lg navbar-dark bg-custom-dark">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuPrincipal">
                <div class="navbar-nav w-100">
                    <a class="nav-link" href="index.html">Index</a>
                    <a class="nav-link" href="mision.html">Misión</a>
                    <a class="nav-link" href="vision.html">Visión</a>
                    <a class="nav-link" href="catalogo.html">Catálogo</a>
                    <a class="nav-link admin-link active ms-lg-auto mt-2 mt-lg-0 px-3" href="adminInventario.html">Administrador de Inventario</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="catalogo-contenedor p-4 p-md-5 text-white">
            
            <h2 class="text-center mb-5">Administrador de inventario</h2>

            <div class="row g-4">
                
                <div class="col-12 col-lg-4">
                    <div class="p-4 border rounded bg-dark">
                        <h4 class="text-center mb-3">Agregar Producto</h4>
                        <form action="inventario">
                            <div class="mb-3">
                                <input type="text" class="form-control" name="nombre" placeholder="Nombre del producto" required>
                            </div>
                            <div class="mb-3">
                                <input type="number" class="form-control" name="cantidad" placeholder="Cantidad" min="0">
                            </div>
                            <div class="mb-3">
                                <select class="form-select" name="tipo_prenda">
                                    <option value="" disabled selected>Selecciona tipo de prenda</option>
                                    <option value="camisa">Camisa / Camiseta</option>
                                    <option value="chaqueta">Chamarra</option>
                                    <option value="accesorio">Accesorio</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <textarea class="form-control" name="descripcion" placeholder="Descripción del producto" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn w-100 fw-bold" style="background-color: #04AA6D; color: white;">Hecho</button>
                        </form>
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <div class="p-4 border rounded bg-dark">
                        <h4 class="text-center mb-3">Actualizar Producto</h4>
                        <form action="inventario">
                            <div class="mb-3">
                                <select class="form-select" name="accion">
                                    <option value="" disabled selected>Seleccione prenda</option>
                                    <option value="update1">Prenda 1</option>
                                    <option value="update2">Prenda 2</option>
                                    <option value="update3">Prenda 3</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <input type="number" class="form-control" name="cantidad" placeholder="Cantidad">
                            </div>
                            <div class="mb-3">
                                <input type="text" class="form-control" name="tipo_prenda" placeholder="Tipo de prenda" readonly>
                            </div>
                            <div class="mb-3">
                                <textarea class="form-control" name="descripcion" placeholder="Descripción del producto" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn w-100 fw-bold" style="background-color: #04AA6D; color: white;">Hecho</button>
                        </form>
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <div class="p-4 border rounded bg-dark">
                        <h4 class="text-center mb-3">Eliminar Producto</h4>
                        <form action="inventario">
                            <div class="mb-3">
                                <select class="form-select" name="accion">
                                    <option value="" disabled selected>Seleccione prenda</option>
                                    <option value="del1">Prenda 1</option>
                                    <option value="del2">Prenda 2</option>
                                    <option value="del3">Prenda 3</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <input type="number" class="form-control" name="cantidad" placeholder="Cantidad" readonly>
                            </div>
                            <div class="mb-3">
                                <input type="text" class="form-control" name="tipo_prenda" placeholder="Tipo de prenda" readonly>
                            </div>
                            <div class="mb-3">
                                <textarea class="form-control" name="descripcion" placeholder="Descripción del producto" rows="3" readonly></textarea>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 fw-bold">Eliminar</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="bg-custom-dark text-white text-center py-4">
        <div class="container">
            <p class="mb-1">Contacto: bombolombodudas@gmail.com</p>
            <p class="mb-1">Horario: 9:00 hrs- 16:00 hrs MX</p>
            <p class="mb-1">Tu opinion es importante para nosotros</p>
            <p class="mb-0">© 2026 Bombolombo Store</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
