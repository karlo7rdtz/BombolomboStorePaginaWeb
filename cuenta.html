<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Cuenta - Bombolombo Store</title>
    <link rel="icon" type="image/png" href="ImgWeb/LogoBombolomboStorePng.png">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Gaeljg/StylesFormsCss@main/stylesForms.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>

<body class="cuenta-fondo">

<div class="navbar-nav w-100">
    <a class="nav-link" href="index.html">Inicio</a>
    <a class="nav-link" href="mision.html">Misión</a>
    <a class="nav-link" href="vision.html">Visión</a>
    <a class="nav-link" href="catalogo.html">Catálogo</a>
    <a class="nav-link admin-link ms-lg-auto" href="adminInventario.html">Administrador de Inventario</a>
    <a class="nav-link active" href="cuenta.html">Cuenta</a>
</div>

    <div class="contenedor-cuenta-negro">
        <img src="ImgWeb/LogoBombolomboStorePng.png" alt="Logo" class="cuenta-logo">

        <div class="cuenta-grid">
            <div class="formulario">
                <h3>Iniciar Sesión</h3>
                <form id="login-form" class="form-container">
                    <input type="text" name="user_login" placeholder="Usuario" required>
                    <div class="password-wrapper">
                        <input type="password" id="pass_login" placeholder="Contraseña" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePass('pass_login', this)"></i>
                    </div>
                    <input type="submit" value="Iniciar sesión">
                </form>
            </div>

            <div class="formulario separador">
                <h3>Crear Cuenta</h3>
                <form id="register-form" class="form-container">
                    <input type="text" id="reg_user" placeholder="Nombre de usuario">
                    <input type="text" id="reg_phone" placeholder="Número telefónico">
                    <input type="email" id="reg_email" placeholder="Correo electrónico">
                    <input type="email" id="reg_email_confirm" placeholder="Repetir correo">
                    
                    <div class="password-wrapper">
                        <input type="password" id="reg_pass" placeholder="Contraseña">
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePass('reg_pass', this)"></i>
                    </div>

                    <div class="password-wrapper">
                        <input type="password" id="reg_pass_confirm" placeholder="Repetir contraseña">
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePass('reg_pass_confirm', this)"></i>
                    </div>

                    <input type="submit" value="Crear cuenta">
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p class="mb-1">Contacto: bombolombodudas@gmail.com</p>
            <p class="mb-1">Horario: 9:00 hrs- 16:00 hrs MX</p>
            <p class="mb-1">Tu opinion es importante para nosotros</p>
            <p class="mb-0">© 2026 Bombolombo Store</p>
        </div>
    </footer>

    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
