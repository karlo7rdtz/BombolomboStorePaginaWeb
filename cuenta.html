<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - Bombolombo Store</title>
    <link rel="icon" type="image/png" href="ImgWeb/LogoBombolomboStorePng.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Gaeljg/StylesFormsCss@main/stylesForms.css?v=1">
</head>

<body class="catalogo-cuerpo">

    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-dark">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuPrincipal">
                <div class="navbar-nav w-100">
                    <a class="nav-link" href="index.html">Inicio</a>
                    <a class="nav-link" href="mision.html">Misión</a>
                    <a class="nav-link" href="vision.html">Visión</a>
                    <a class="nav-link" href="catalogo.html">Catálogo</a>
                    <a class="nav-link admin-link ms-lg-auto" href="adminInventario.html">Administrador de Inventario</a>
                    <a class="nav-link active" href="cuenta.html">Cuenta</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="catalogo-contenedor p-4 p-md-5 text-white">
            
            <div class="text-center mb-5">
                <img src="ImgWeb/LogoBombolomboStorePng.png" alt="Logo" class="img-fluid" style="max-width: 280px;">
            </div>

            <div class="row g-4 justify-content-evenly">
                
                <div class="col-12 col-lg-5">
                    <div class="formulario">
                        <h3>Iniciar Sesión</h3>
                        <form id="login-form" class="form-container mt-4">
                            <div class="mb-3">
                                <input type="text" class="form-control" name="user_login" placeholder="Usuario" required>
                            </div>
                            <div class="mb-3 position-relative">
                                <input type="password" class="form-control" id="pass_login" placeholder="Contraseña" required>
                                <i class="fa-solid fa-eye position-absolute" style="right: 15px; top: 12px; cursor: pointer; color: #04AA6D;" onclick="togglePass('pass_login', this)"></i>
                            </div>
                            <input type="submit" value="Iniciar sesión" class="w-100">
                        </form>
                    </div>
                </div>

                <div class="col-12 col-lg-5">
                    <div class="formulario">
                        <h3>Crear Cuenta</h3>
                        <form id="register-form" class="form-container mt-4">
                            <div class="mb-3">
                                <input type="text" class="form-control" id="reg_user" placeholder="Nombre de usuario">
                            </div>
                            <div class="mb-3">
                                <input type="text" class="form-control" id="reg_phone" placeholder="Número telefónico">
                            </div>
                            <div class="mb-3">
                                <input type="email" class="form-control" id="reg_email" placeholder="Correo electrónico">
                            </div>
                            <div class="mb-3">
                                <input type="email" class="form-control" id="reg_email_confirm" placeholder="Repetir correo">
                            </div>
                            
                            <div class="mb-3 position-relative">
                                <input type="password" class="form-control" id="reg_pass" placeholder="Contraseña">
                                <i class="fa-solid fa-eye position-absolute" style="right: 15px; top: 12px; cursor: pointer; color: #04AA6D;" onclick="togglePass('reg_pass', this)"></i>
                            </div>

                            <div class="mb-3 position-relative">
                                <input type="password" class="form-control" id="reg_pass_confirm" placeholder="Repetir contraseña">
                                <i class="fa-solid fa-eye position-absolute" style="right: 15px; top: 12px; cursor: pointer; color: #04AA6D;" onclick="togglePass('reg_pass_confirm', this)"></i>
                            </div>

                            <input type="submit" value="Crear cuenta" class="w-100">
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="bg-custom-dark text-white text-center py-4">
        <div class="container">
            <p class="mb-1">Contacto: bombolombodudas@gmail.com</p>
            <p class="mb-1">Horario: 9:00 hrs- 16:00 hrs MX</p>
            <p class="mb-1">Tu opinion es importante para nosotros</p>
            <p class="mb-3">© 2026 Bombolombo Store</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="https://jigsaw.w3.org/css-validator/check/referer"><img style="border:0;width:88px;height:31px" src="https://jigsaw.w3.org/css-validator/images/vcss" alt="¡CSS Válido!" /></a>
                <a href="https://jigsaw.w3.org/css-validator/check/referer"><img style="border:0;width:88px;height:31px" src="https://jigsaw.w3.org/css-validator/images/vcss-blue" alt="¡CSS Válido!" /></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
