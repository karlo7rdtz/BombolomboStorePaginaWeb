    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const secciones = document.querySelectorAll(".seccion-categoria");
        const enlaces = document.querySelectorAll(".categorias a");
        const contenedorSlider = document.querySelector('.slider-catalogo');

        enlaces.forEach(enlace => {
            enlace.addEventListener("click", function(evento) {
                evento.preventDefault(); 

                const idDestino = this.getAttribute("href");
                const seccionDestino = document.querySelector(idDestino);

                if (seccionDestino) {

                    seccionDestino.scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'nearest', 
                        inline: 'start' 
                    });
                }
            });
        });

        const opciones = {
            root: contenedorSlider,
            threshold: 0.5 
        };

        const observador = new IntersectionObserver((entradas) => {
            entradas.forEach(entrada => {
                if (entrada.isIntersecting) {
                    enlaces.forEach(enlace => enlace.classList.remove("categoria-activa"));
                    
                    const idActivo = entrada.target.getAttribute("id");
                    const enlaceCorrespondiente = document.querySelector(`.categorias a[href="#${idActivo}"]`);
                    
                    if (enlaceCorrespondiente) {
                        enlaceCorrespondiente.classList.add("categoria-activa");
                    }
                }
            });
        }, opciones);

        secciones.forEach(seccion => {
            observador.observe(seccion);
        });
    });

</script>
